# ============================================================
# M8 — CyberSentinel CI/CD Fast Pipeline
# Analyse le repo CyberSentinel lui-même
# Push main/develop + PR vers main
# ============================================================

name: CyberSentinel CI — Security Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  CYBERSENTINEL_API_URL: ${{ secrets.CYBERSENTINEL_API_URL }}

jobs:
  semgrep:
    name: "M4 — Semgrep OWASP Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep OWASP Top 10
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/javascript \
            --sarif \
            --output semgrep-results.sarif \
            --quiet \
            . || true

      - name: Upload Semgrep SARIF
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 7

  trivy:
    name: "M4 — Trivy SCA Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --quiet \
            . || true

      - name: Upload Trivy SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 7

  gitleaks:
    name: "M4 — Gitleaks Secrets Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar xzf gitleaks_8.18.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0 \
            --quiet || true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7

  ml-smoke:
    name: "M2 — ML Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install scikit-learn numpy pandas tensorflow joblib

      - name: Run ML smoke test
        run: |
          python3 scripts/smoke_test_ml.py \
            --model-path data/models \
            --output ml-smoke-result.json || true

      - name: Upload ML smoke result
        uses: actions/upload-artifact@v4
        with:
          name: ml-smoke-result
          path: ml-smoke-result.json
          retention-days: 7

  quality-gate:
    name: "M8 — Quality Gate Decision"
    runs-on: ubuntu-latest
    needs: [semgrep, trivy, gitleaks, ml-smoke]
    timeout-minutes: 4
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Evaluate Quality Gate
        id: gate
        run: |
          python3 scripts/quality_gate.py \
            --semgrep-sarif semgrep-sarif/semgrep-results.sarif \
            --trivy-sarif trivy-sarif/trivy-results.sarif \
            --gitleaks-json gitleaks-report/gitleaks-report.json \
            --ml-smoke-json ml-smoke-result/ml-smoke-result.json \
            --output gate-result.json

          DECISION=$(python3 -c "import json; print(json.load(open('gate-result.json')).get('decision','PASS'))")
          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "Quality Gate: $DECISION"

      - name: Upload gate result
        uses: actions/upload-artifact@v4
        with:
          name: gate-result
          path: gate-result.json
          retention-days: 7

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('gate-result.json', 'utf8'));

            const icon = result.decision === 'PASS' ? '✅' : '🚨';
            const status = result.decision === 'PASS' ? 'MERGE AUTORISÉ' : 'MERGE BLOQUÉ';

            let body = `## ${icon} CyberSentinel Quality Gate — ${status}\n\n`;

            if (result.blockers?.length) {
              body += `### ❌ Blocages\n`;
              result.blockers.forEach(b => body += `- ${b}\n`);
              body += `\n`;
            }

            if (result.warnings?.length) {
              body += `### ⚠️ Avertissements\n`;
              result.warnings.forEach(w => body += `- ${w}\n`);
              body += `\n`;
            }

            body += `### 📊 Résumé\n`;
            body += `| Outil | Résultat |\n|---|---|\n`;
            body += `| Semgrep | ${result.semgrep_ok ? '✅' : '❌'} |\n`;
            body += `| Trivy | ${result.trivy_ok ? '✅' : '❌'} |\n`;
            body += `| Gitleaks | ${result.gitleaks_ok ? '✅' : '❌'} |\n`;
            body += `| ML Smoke | ${result.ml_ok ? '✅' : '❌'} |\n\n`;
            body += `*CyberSentinel M8 — Hypothèse H5*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Notify CyberSentinel webhook
        if: always() && env.CYBERSENTINEL_API_URL != ''
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          api_url = os.environ.get("CYBERSENTINEL_API_URL", "").rstrip("/")
          if not api_url:
              raise SystemExit(0)

          result = json.load(open("gate-result.json"))
          payload = {
              "run_id": str(os.environ.get("GITHUB_RUN_ID", "")),
              "decision": result.get("decision", "UNKNOWN"),
              "pr_number": os.environ.get("GITHUB_EVENT_PULL_REQUEST_NUMBER", ""),
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "repo": os.environ.get("GITHUB_REPOSITORY", "")
          }

          req = urllib.request.Request(
              f"{api_url}/api/cicd/webhook",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  print(resp.read().decode())
          except Exception as e:
              print(f"Webhook notify failed: {e}")
          EOF
        env:
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}

      - name: Fail if BLOCK decision
        if: steps.gate.outputs.decision == 'BLOCK'
        run: |
          echo "🚨 Quality Gate ÉCHOUÉ — Merge bloqué"
          exit 1