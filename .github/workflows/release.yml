# ============================================================
# M8 — Release Pipeline
# ============================================================

name: CyberSentinel Release Pipeline

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}-frontend
  PYTHON_VERSION: "3.11"

jobs:
  security-check:
    name: "Security Check — Pre-Release"
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install semgrep

      - name: Full security scan
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --sarif \
            --output security-check.sarif \
            . || true

      - name: Evaluate security gate
        run: |
          python3 scripts/quality_gate.py \
            --semgrep-sarif security-check.sarif \
            --output release-gate.json

          python3 - << 'EOF'
          import json, sys
          d = json.load(open("release-gate.json"))
          if d.get("decision") == "BLOCK":
              print("❌ Release bloquée — vulnérabilités critiques")
              sys.exit(1)
          print("✅ Security check OK")
          EOF

  build:
    name: "Build Docker Images"
    runs-on: ubuntu-latest
    needs: security-check
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Extract frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  e2e-tests:
    name: "Tests E2E"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d postgres redis backend
          sleep 20

      - name: Run E2E tests
        run: |
          pip install httpx pytest pytest-asyncio pytest-timeout
          pytest tests/e2e/ -v --timeout=60

      - name: Stop services
        if: always()
        run: docker compose down

  release-notes:
    name: "Generate Release Notes"
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `CyberSentinel ${tag}`,
              body:
                `## CyberSentinel Release\n\n` +
                `### Modules\n` +
                `- M1 IDS Signature (Suricata)\n` +
                `- M2 IDS ML Anomalie (Zero-Day)\n` +
                `- M3 Fusion Hybride\n` +
                `- M4 SAST (Semgrep + Trivy + Gitleaks)\n` +
                `- M5 DAST Sandbox\n` +
                `- M6 MITRE ATT&CK\n` +
                `- M7 Score de Risque R\n` +
                `- M8 CI/CD Quality Gates\n` +
                `- M9 Dashboard React\n` +
                `- M10 Boucle Adaptative ML\n`,
              draft: false,
              prerelease: false,
              generate_release_notes: true,
            });
            console.log(`Release créée : ${release.html_url}`);