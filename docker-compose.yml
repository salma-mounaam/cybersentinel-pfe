# ============================================================
# CyberSentinel — docker-compose.yml
# 3 réseaux Docker imposés par le CDC :
#   main-net    : services principaux
#   mgmt-net    : canal backend ↔ ZAP
#   sandbox-net : cibles DAST (internal:true — ZERO internet)
# FIX : command Suricata — pointe vers /etc/suricata/rules (volume monté)
# ============================================================

services:
  # ──────────────────────────────────────────────────────
  # BASE DE DONNÉES
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cybersentinel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybersentinel}
      POSTGRES_USER: ${POSTGRES_USER:-csadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cspassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csadmin} -d ${POSTGRES_DB:-cybersentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "5432:5432"

  # ──────────────────────────────────────────────────────
  # CACHE & BROKER
  # ──────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cybersentinel_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - main-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"

  # ──────────────────────────────────────────────────────
  # BACKEND FASTAPI
  # ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: cybersentinel_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CYBERSENTINEL_COMPOSE_FILE: /app/docker-compose.yml
      DOCKER_HOST: unix:///var/run/docker.sock
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./data:/app/data
      - ./data/dast_captures:/shared/dast_captures
      - ml_models:/app/data/models
      - suricata_logs:/var/log/suricata:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - main-net
      - mgmt-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

  # ──────────────────────────────────────────────────────
  # WORKER CELERY
  # ──────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: cybersentinel_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./data/dast_captures:/shared/dast_captures
      - ml_models:/app/data/models
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - main-net
      - mgmt-net
    healthcheck:
      disable: true

  # ──────────────────────────────────────────────────────
  # CELERY BEAT
  # ──────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: cybersentinel_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./data/dast_captures:/shared/dast_captures
      - ml_models:/app/data/models
    networks:
      - main-net
    healthcheck:
      disable: true

  # ──────────────────────────────────────────────────────
  # FRONTEND REACT
  # ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: cybersentinel_frontend
    restart: unless-stopped
    networks:
      - main-net
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_API_ROOT: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws

  # ──────────────────────────────────────────────────────
  # SURICATA IDS (M1)
  # FIX : command pointe vers /etc/suricata/rules (volume monté)
  # Avant : règles cherchées dans /var/lib/suricata/rules (non persistant)
  # Après : règles lues depuis ./suricata/rules monté en volume
  # ──────────────────────────────────────────────────────
  suricata:
    image: jasonish/suricata:latest
    container_name: cybersentinel_suricata
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/rules:/etc/suricata/rules
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - suricata_logs:/var/log/suricata
    command: >
      -i ens192
      --set default-rule-path=/etc/suricata/rules
      --set rule-files.0=suricata.rules
      --set classification-file=/etc/suricata/classification.config
      --set reference-config-file=/etc/suricata/reference.config

  # ──────────────────────────────────────────────────────
  # OWASP ZAP custom (M5 — DAST + PCAP)
  # ──────────────────────────────────────────────────────
  zap:
    image: cybersentinel-zap:custom
    container_name: cybersentinel_zap
    restart: "no"
    command:
      [
        "zap.sh",
        "-daemon",
        "-host",
        "0.0.0.0",
        "-port",
        "8090",
        "-config",
        "api.disablekey=true",
        "-config",
        "api.addrs.addr.name=.*",
        "-config",
        "api.addrs.addr.regex=true"
      ]
    volumes:
      - ./data/dast_captures:/shared/dast_captures
    networks:
      - sandbox-net
      - mgmt-net
    ports:
      - "8090:8090"
    profiles:
      - dast
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/JSON/core/view/version/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  webgoat:
    image: webgoat/webgoat:latest
    container_name: cybersentinel_webgoat
    restart: "no"
    networks:
      - sandbox-net
    profiles:
      - dast
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/WebGoat/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: cybersentinel_dvwa
    restart: "no"
    networks:
      - sandbox-net
    profiles:
      - dast

networks:
  main-net:
    name: cybersentinel_main-net
    external: true

  mgmt-net:
    name: cybersentinel_mgmt-net
    external: true

  sandbox-net:
    name: cybersentinel_sandbox-net
    external: true

volumes:
  postgres_data:
  redis_data:
  suricata_logs:
  ml_models: